id: biomni-v1
name: biomni
version: 1.0.0
author: paras25619@gmail.com

# Description
description: |
  A comprehensive biomedical AI agent that integrates advanced language model reasoning
  with specialized bioinformatics and drug discovery tools. Supports CRISPR screen design,
  single-cell RNA-seq analysis, ChEMBL database queries, BLAST sequence analysis,
  and scientific report generation including PDF outputs. Designed for researchers,
  scientists, and bioinformaticians.

# Tags and Modes
tags:
  - biomedical
  - crispr
  - scrna-seq
  - chembl
  - drug-discovery
  - genomics
  - bioinformatics
  - scientific-reporting

input_modes:
  - text/plain
  - application/json

output_modes:
  - text/plain
  - application/json
  - text/markdown
  - application/pdf

# Example Queries
examples:
  - "Design a CRISPR knockout screen for identifying essential genes in human cancer cell lines"
  - "Analyze this single-cell RNA-seq dataset to identify cell types and marker genes"
  - "Query ChEMBL for bioactivity data on this SMILES: CC(C)NCC(COC1=CC=CC=C1)O"
  - "Generate a PDF report on CRISPR-Cas9 applications in immunotherapy"
  - "Run BLAST on this DNA sequence: AGCTAGCTAGCTAGCTAGCT"

# Detailed Capabilities
capabilities_detail:
  primary_capability:
    supported: true
    description: "Biomedical research assistance integrating CRISPR design, scRNA-seq analysis, database queries, and sequence analysis"
    features:
      - "CRISPR sgRNA design guidance and experimental planning"
      - "Single-cell RNA-seq clustering and marker identification"
      - "Differential gene expression analysis"
      - "ChEMBL molecule lookup and bioactivity retrieval"
      - "BLAST sequence alignment and interpretation"
      - "Scientific report generation with structured outputs"
    limitations: "Does not provide clinical diagnosis, medical treatment advice, or regulatory decisions"

  secondary_capability:
    supported: true
    description: "Scientific documentation and export generation"
    features:
      - "PDF report generation with structured formatting"
      - "Metadata inclusion and automatic pagination"
      - "Base64-encoded output support"
      - "Methodology documentation for reproducibility"
      - "Experimental validation strategy suggestions"

# Requirements
requirements:
  packages:
    - "agno>=2.2.0"
    - "bindu>=2026.6.6"
    - "openai>=2.11.0"
    - "python-dotenv>=1.0.0"
    - "biopython>=1.86"
    - "scanpy>=1.12"
    - "pandas>=2.0.0"
    - "numpy>=1.24.0"
    - "reportlab>=4.4.9"
    - "chembl-webresource-client>=0.10.9"
  system:
    - "Internet access for BLAST and ChEMBL queries"
  min_memory_mb: 1024
  external_services:
    - "OpenRouter API"
    - "NCBI BLAST"
    - "ChEMBL Database"

# Performance Metrics
performance:
  avg_processing_time_ms: 5000
  max_concurrent_requests: 10
  memory_per_request_mb: 1024
  scalability: horizontal

# Tool Restrictions
allowed_tools:
  - run_blast_sequence_async
  - analyze_scrnaseq_async
  - query_chembl_database_async
  - generate_pdf_report_async
  - design_crispr_sgrna_async

# Rich Documentation
documentation:
  overview: |
    The BioOmni skill provides advanced biomedical analysis by combining large
    language model reasoning with domain-specific bioinformatics and drug discovery
    tools. It assists in experimental planning, genomic analysis, molecular database
    querying, and structured scientific reporting. Intended for research use only.

  use_cases:
    when_to_use:
      - "CRISPR screen design and experimental planning"
      - "Single-cell RNA-seq data interpretation"
      - "Drug discovery and molecule bioactivity lookup"
      - "BLAST sequence similarity analysis"
      - "Scientific report generation for research documentation"

    when_not_to_use:
      - "Clinical diagnosis or patient treatment decisions"
      - "Regulatory approval advice"
      - "Emergency medical scenarios"
      - "Non-biomedical general tasks"

  input_structure: |
    Accepts biomedical research queries in plain text or JSON format.

    Example (Plain Text):
    "Design a CRISPR knockout screen targeting metabolic genes in liver cancer"

    Example (JSON):
    {
      "task": "crispr_design | scrna_analysis | chembl_query | blast | report",
      "input_data": "sequence, dataset path, or SMILES string",
      "output_format": "text | json | pdf",
      "parameters": {
        "species": "human",
        "analysis_depth": "standard | advanced"
      }
    }

    Constraints:
    - DNA/RNA sequences must use valid nucleotide characters
    - scRNA-seq data must be preprocessed (.h5ad, .loom, or 10x format)
    - Internet required for BLAST and ChEMBL
    - English language preferred

  output_format: |
    Returns structured biomedical analysis including:

    - TASK SUMMARY: Overview of requested analysis
    - INPUT VALIDATION: Confirmation of sequence/data validity
    - ANALYSIS RESULTS:
        - CRISPR design recommendations or sgRNA guidelines
        - scRNA-seq clustering and marker genes
        - BLAST alignment summaries
        - ChEMBL bioactivity data
    - INTERPRETATION: Biological or experimental interpretation
    - METHODOLOGY: Tools and reasoning steps used
    - RECOMMENDATIONS: Suggested next experimental steps
    - EXPORT OPTIONS:
        - Structured JSON
        - Markdown report
        - PDF document (if requested)

  error_handling:
    - "Invalid sequence: Returns validation error with correction suggestions"
    - "Missing API keys: Returns setup instructions"
    - "File not found: Requests correct dataset path"
    - "Timeout: Suggests shorter sequences or reduced analysis depth"
    - "Unsupported format: Lists supported file types"

  examples:
    - title: "CRISPR Screen Design"
      input:
        content: "Design a CRISPR knockout screen for essential genes in cancer cells"
      output:
        task_summary: "CRISPR screen design for essential gene identification"
        sgrna_guidelines: 6
        validation_strategy: "Included"
        processing_time_ms: 5400

    - title: "ChEMBL Molecule Query"
      input:
        content: "Query ChEMBL for bioactivity data on SMILES: CC(C)NCC(COC1=CC=CC=C1)O"
      output:
        molecules_found: 3
        targets_identified: 5
        bioactivity_records: 12
        processing_time_ms: 4800

  best_practices:
    for_developers:
      - "Validate biological input formats before submission"
      - "Specify species and experimental context"
      - "Use JSON input for structured workflows"
      - "Allow up to 180 seconds for complex analyses"
      - "Ensure API keys for BLAST and ChEMBL are configured"

    for_orchestrators:
      - "Route genomics, CRISPR, and drug discovery queries here"
      - "Avoid routing clinical decision-making requests"
      - "Allocate higher memory (1024MB per request)"
      - "Set timeout to 180 seconds for sequence-heavy analysis"
      - "Monitor external API usage and rate limits"

  installation: |
    Required packages:
    pip install agno bindu openai python-dotenv biopython scanpy pandas numpy reportlab chembl-webresource-client

    Environment variables:
    - OPENROUTER_API_KEY
    - MEM0_API_KEY (optional)

    Internet access required for:
    - NCBI BLAST
    - ChEMBL database queries

  versioning:
    - version: "1.0.0"
      date: "2026-01-10"
      changes: "Initial release with CRISPR design, scRNA-seq analysis, ChEMBL integration, BLAST support, and PDF reporting"
    - version: "1.1.0"
      status: "planned"
      changes: "Enhanced off-target prediction integration and expanded multi-omics support"

# Assessment
assessment:
  keywords:
    - "crispr"
    - "blast"
    - "scrna-seq"
    - "single-cell"
    - "chembl"
    - "drug discovery"
    - "gene"
    - "sequence"
    - "bioinformatics"
    - "biomedical"

  specializations:
    - domain: "gene editing"
      confidence_boost: 0.4
    - domain: "single cell analysis"
      confidence_boost: 0.4
    - domain: "drug discovery"
      confidence_boost: 0.3

  anti_patterns:
    - "clinical diagnosis"
    - "patient treatment"
    - "medical advice"
    - "regulatory decision"

  complexity_indicators:
    simple:
      - "basic gene lookup"
      - "single sequence blast"
    medium:
      - "standard CRISPR design"
      - "single dataset scrna analysis"
    complex:
      - "multi-condition scrna comparison"
      - "large sequence alignment"
      - "comprehensive drug discovery analysis"
